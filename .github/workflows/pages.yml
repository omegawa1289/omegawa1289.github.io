name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A7D63D: ${{ secrets.A7D63D }}
          B97797: ${{ secrets.B97797 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('A7D63D', '')
          k2 = os.environ.get('B97797', '')
          idx = pathlib.Path('index.html')
          txt = idx.read_text(encoding='utf-8')
          out = txt.replace('<!-- 66b5df51897792cc2794739c286dfeff3bccf758e54e8df2 -->', k1) if k1 else txt
          out = out.replace('<!-- 221b80502f154616932ca948f97056f855975213b1c2 -->', k2) if k2 else out
          if out == txt and (k1 or k2):
              sys.exit(1)
          if out != txt:
              idx.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
